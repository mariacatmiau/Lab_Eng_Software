<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastrar | DoaDoa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/app-ui.css">
</head>
<body class="flex items-center justify-center min-h-screen px-4 py-10">
<div class="card-elevated p-8 w-full max-w-lg">
  <h1 class="text-3xl font-extrabold mb-2 text-green-800 text-center">Cadastro no DoaDoa</h1>
  <p class="text-center text-gray-600 mb-6">Crie sua conta para publicar, receber ou buscar produtos perto do vencimento.</p>

  <div id="authMessage" class="hidden rounded-md px-4 py-3 text-sm font-semibold mb-4"></div>

  <form id="registerForm" class="space-y-4">
    <label for="tipo" class="block text-sm font-bold text-gray-800">Tipo de usuário *</label>
    <select id="tipo" class="rounded-md w-full px-3 py-2" required>
      <option value="">Selecione o tipo de usuário</option>
      <option value="CLIENTE">Pessoa / Cliente</option>
      <option value="FUNCIONARIO">Supermercado / Funcionário</option>
      <option value="ONG">ONG</option>
    </select>

    <input type="text" id="nome" placeholder="Nome" class="rounded-md w-full px-3 py-2" required />
    <input type="email" id="email" placeholder="E-mail" class="rounded-md w-full px-3 py-2" required />
    <input type="password" id="senha" placeholder="Senha" class="rounded-md w-full px-3 py-2" required />
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <input type="text" id="rua" placeholder="Rua" class="rounded-md w-full px-3 py-2" required />
      <input type="text" id="numero" placeholder="Número" class="rounded-md w-full px-3 py-2" required />
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <input type="text" id="bairro" placeholder="Bairro" class="rounded-md w-full px-3 py-2" required />
      <input type="text" id="cidade" placeholder="Cidade" class="rounded-md w-full px-3 py-2" required />
    </div>
    <input type="text" id="estado" placeholder="Estado (UF)" maxlength="2" class="rounded-md w-full px-3 py-2 uppercase" required />
    <input type="text" id="telefone" placeholder="Telefone para contato" class="rounded-md w-full px-3 py-2" required />

    <button class="w-full primary-btn">Cadastrar</button>

    <p class="text-center text-sm mt-4">
      Já tem conta? <a href="login.html" class="text-green-700 hover:underline">Entrar</a>
    </p>
  </form>

  <div class="info-callout mt-6">Preencha telefone com DDD para facilitar contato rápido.</div>
</div>
<script src="js/app-core.js?v=20260312-1" defer></script>
<script src="js/address-form.js?v=20260312-1" defer></script>
<script src="js/auth.js?v=20260312-3" defer></script>
</body>
</html>
