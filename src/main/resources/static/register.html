<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastrar | DoaDoa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <link rel="stylesheet" href="css/app-ui.css">
</head>
<body class="auth-wrapper">
<div class="auth-card auth-card--wide">
  <div class="auth-logo">
    <div class="auth-logo-icon">
      <i data-feather="heart" style="width:22px;height:22px;color:#fff"></i>
    </div>
    <span class="auth-logo-text">DoaDoa</span>
  </div>

  <h1 class="auth-title">Crie sua conta</h1>
  <p class="auth-subtitle">Publique, receba ou busque produtos perto do vencimento.</p>

  <div id="authMessage" class="hidden rounded-lg px-4 py-3 text-sm font-semibold mb-4"></div>

  <form id="registerForm" class="space-y-4">
    <div>
      <label for="tipo" class="block mb-1.5">Tipo de usuário *</label>
      <select id="tipo" class="w-full px-3 py-2.5" required>
        <option value="">Selecione o tipo de usuário</option>
        <option value="CLIENTE">Pessoa / Cliente</option>
        <option value="FUNCIONARIO">Supermercado / Funcionário</option>
        <option value="ONG">ONG</option>
      </select>
    </div>

    <div>
      <label for="nome" class="block mb-1.5">Nome *</label>
      <input type="text" id="nome" placeholder="Seu nome completo" class="w-full px-3 py-2.5" required />
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label for="email" class="block mb-1.5">E-mail *</label>
        <input type="email" id="email" placeholder="seuemail@exemplo.com" class="w-full px-3 py-2.5" required />
      </div>
      <div>
        <label for="senha" class="block mb-1.5">Senha *</label>
        <input type="password" id="senha" placeholder="Crie uma senha" class="w-full px-3 py-2.5" required />
      </div>
    </div>

    <div class="auth-divider">Endereço</div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label for="rua" class="block mb-1.5">Rua *</label>
        <input type="text" id="rua" placeholder="Nome da rua" class="w-full px-3 py-2.5" required />
      </div>
      <div>
        <label for="numero" class="block mb-1.5">Número *</label>
        <input type="text" id="numero" placeholder="123" class="w-full px-3 py-2.5" required />
      </div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <div>
        <label for="bairro" class="block mb-1.5">Bairro *</label>
        <input type="text" id="bairro" placeholder="Bairro" class="w-full px-3 py-2.5" required />
      </div>
      <div>
        <label for="cidade" class="block mb-1.5">Cidade *</label>
        <input type="text" id="cidade" placeholder="Cidade" class="w-full px-3 py-2.5" required />
      </div>
      <div>
        <label for="estado" class="block mb-1.5">UF *</label>
        <input type="text" id="estado" placeholder="SP" maxlength="2" class="w-full px-3 py-2.5 uppercase" required />
      </div>
    </div>

    <div>
      <label for="telefone" class="block mb-1.5">Telefone com DDD *</label>
      <input type="text" id="telefone" placeholder="(11) 99999-0000" class="w-full px-3 py-2.5" required />
    </div>

    <button class="w-full primary-btn" style="padding:0.7rem;margin-top:0.5rem" type="submit">Cadastrar</button>
  </form>

  <div class="auth-divider">ou</div>

  <div class="text-center">
    <a href="login.html" class="neutral-btn w-full justify-center">Já tenho conta — Entrar</a>
  </div>
</div>

<script>feather.replace();</script>
<script src="js/app-core.js?v=20260409-1" defer></script>
<script src="js/address-form.js?v=20260409-1" defer></script>
<script src="js/auth.js?v=20260409-1" defer></script>
</body>
</html>
